<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Login</title>
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body>
  <div class="login-container">
    <h2>Online Portfolio</h2>
    <p>Please enter your login details.</p>

    <form id="userForm">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" required>

      <label for="password">Password</label>
      <div class="password-container">
        <input type="password" id="password" placeholder="************" required>
        <span id="togglePass" class="eye-icon">
          <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.94M9.88 9.88A3 3 0 0 0 12 15a3 3 0 0 0 2.12-5.12M1 1l22 22"/>
          </svg>
        </span>
      </div>

      <div class="options">
        <label><input type="checkbox" id="rememberMe"> Remember me</label>
      </div>

      <button type="submit" class="btn">Sign in</button>
      <button type="button" id="googleLogin" class="btn google">
        <img src="images/google-icon.png" alt="Google" class="google-icon">
        Sign in with Google
      </button>

      <p class="signup">Don't have an account? <a href="register.html">Sign up for free!</a></p>
    </form>
  </div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="scripts/auth.js"></script>
</body>
</html>
