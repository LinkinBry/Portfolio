<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Me</title>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/contact.css">
  <link rel="stylesheet" href="styles/light.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
<header class="topbar">
  <div class="logotxt">
    <h1><span class="first">My</span><span class="second">Portfolio</span></h1>
  </div>
  <nav class="menu">
    <ul>
      <li><a href="homepage.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="project.html">Projects</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
      <li><a href="index.html" class="logout-btn">Logout</a></li>
    </ul>
  </nav>
</header>

<button id="themeToggle" class="theme-toggle">
  <span class="knob">
    <i data-feather="moon" class="icon-sun"></i>
    <i data-feather="sun" class="icon-moon"></i>
  </span>
</button>

<main class="content">
  <section class="block">
    <h2>Contact Me</h2>
    <p>If you’d like to reach out, please fill in the form below.</p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Your email" required>
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>
      </div>

      <button type="submit" class="send-btn">Send</button>
    </form>
  </section>
</main>

<footer class="foot">

</footer>

<script src="scripts/script.js"></script>
</body>
</html>
